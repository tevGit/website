<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Portfolio</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    /* je laisse les sections vides pour remplir plus tard */
    background:#f5f5f5;
}

header{
    background:#222;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#333;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

section{
    padding:40px;
    max-width:1000px;
    margin:auto;
}

.projects{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.project{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>Mon Portfolio</h1>
</header>

<nav>
<a href="#about">À propos</a>
<a href="#projects">Projets</a>
<a href="#contact">Contact</a>
</nav>

<section id="about">
</section>

<section id="projects">
</section>

<section id="contact">
<h2>Contact</h2>
</section>

<footer>
</footer>

</body>
</html>
